<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoleLens</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">RoleLens</p>
        <h1>Company controls for wanted.co.kr</h1>
        <p class="lede">
          Configure exact company-name rules and the default interest level for
          companies you have not classified yet.
        </p>
      </header>

      <section class="panel">
        <div class="panel-grid">
          <form id="company-form" class="composer">
            <label class="field">
              <span>Company name</span>
              <input
                id="company-name"
                name="companyName"
                type="text"
                placeholder="Add an exact company name"
                required
              />
            </label>
            <label class="field field--compact">
              <span>Status</span>
              <select id="company-status" name="companyStatus">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="x">x</option>
              </select>
            </label>
            <button class="primary-action" type="submit">Add company</button>
          </form>

          <section class="subpanel">
            <h2>Default status for unspecified companies</h2>
            <fieldset id="default-status" class="segmented">
              <label>
                <input type="radio" name="default-status" value="+" />
                <span>+</span>
              </label>
              <label>
                <input type="radio" name="default-status" value="-" />
                <span>-</span>
              </label>
            </fieldset>
          </section>

          <section class="subpanel">
            <h2>Saved companies</h2>
            <ul id="company-list" class="company-list"></ul>
          </section>
        </div>
      </section>
    </main>
    <script src="./options.js"></script>
  </body>
</html>
